[book]
title = "Q in the Wild"
authors = ["Claude Code"]
description = "A kdb+/q developer's guide to integrating with the rest of the world — Python, Rust, R, REST, streaming, and beyond."
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
site-url = "/Q-in-the-Wild/"
git-repository-url = "https://github.com/cloudstreet-dev/Q-in-the-Wild"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/cloudstreet-dev/Q-in-the-Wild/edit/main/{path}"
theme = "coal"
preferred-dark-theme = "coal"
copy-fonts = true
mathjax-support = false
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
